<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커피 주문하기</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 350px; }
        .session-tag { background: #6f4e37; color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.8em; display: inline-block; margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #6f4e37; color: white; font-weight: bold; border: none; cursor: pointer; }
        #successView { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div id="orderView">
        <div id="sessionDisplay" class="session-tag">세션 확인 중...</div>
        <h2>☕ 커피 주문</h2>
        <input type="text" id="uName" placeholder="이름 입력">
        
        <select id="mName">
            <option value="">-- 메뉴를 선택하세요 --</option>
        </select>

        <select id="isIce">
            <option value="true">ICE</option>
            <option value="false">HOT</option>
        </select>
        <button onclick="sendOrder()">주문하기</button>
    </div>

    <div id="successView">
        <h2 style="color:#4CAF50;">✅ 주문 완료!</h2>
        <p>전송되었습니다. 맛있게 드세요!</p>
    </div>
</div>

<script>
    // 1. 메뉴 데이터 구조화 (HOT이 불가능한 메뉴는 iceOnly: true를 붙여줍니다)
    const coffeeMenus = [
        { name: "에스프레소", iceOnly: false },                
        { name: "아메리카노", iceOnly: false },
        { name: "오늘의 커피", iceOnly: false },
        { name: "콜드브루", iceOnly: false },
        { name: "디카페인 콜드브루", iceOnly: false },
        { name: "카푸치노", iceOnly: false },
        { name: "카페라떼", iceOnly: false },        
        { name: "카페모카", iceOnly: false },
        { name: "돌체 라떼", iceOnly: false },
        { name: "바닐라빈 라떼", iceOnly: false },
        { name: "콜드브루 라떼", iceOnly: false },
        { name: "디카페인 콜드브루 라떼", iceOnly: false },
        { name: "바닐라 라떼", iceOnly: false },
        { name: "카라멜 라떼", iceOnly: false },
        { name: "헤이즐넛 라떼", iceOnly: false },
        { name: "홍차 라떼", iceOnly: false },
        { name: "그린티 라떼", iceOnly: false },
        { name: "오곡 라떼", iceOnly: false },        
        { name: "딸기 라떼", iceOnly: false },
        { name: "꿀고구마 라떼", iceOnly: false },
        { name: "토피넛라떼", iceOnly: false },
        { name: "스팀우유", iceOnly: false },
        { name: "핫초코", iceOnly: false },
        { name: "유자차", iceOnly: false },
        { name: "모과차", iceOnly: false },
        { name: "생강차", iceOnly: false },
        { name: "오미베리티", iceOnly: false },
        { name: "레몬티", iceOnly: false },
        { name: "자몽티", iceOnly: false },
        { name: "오렌지티", iceOnly: false },
        { name: "루이보스 꿀 매실", iceOnly: false },
        { name: "루이보스 빌베리", iceOnly: false },
        { name: "얼그레이 리저브", iceOnly: false },
        { name: "로열 캐모마일", iceOnly: false },
        { name: "쿨 민트", iceOnly: false },
        { name: "녹차", iceOnly: false },
        { name: "스위트 레몬그라스", iceOnly: false },
        { name: "홍삼 쌍화차", iceOnly: false },
        { name: "홍삼 쌍화라떼", iceOnly: false },
        { name: "리얼 야생꿀차", iceOnly: false },
        { name: "아이스초코", iceOnly: false }
        { name: "아포카토", iceOnly: false }
        { name: "레몬에이드", iceOnly: true },
        { name: "오렌지에이드", iceOnly: true },
        { name: "자몽에이드", iceOnly: true },
        { name: "청포도에이드", iceOnly: true },
        { name: "블루베리에이드", iceOnly: true },
        { name: "모과에이드", iceOnly: true },
        { name: "유자에이드", iceOnly: true },
        { name: "루이보스에이드", iceOnly: true },
        { name: "복숭아 아이스티", iceOnly: true },
        { name: "플레인 요거트 스무디", iceOnly: true },
        { name: "블루베리 요거트 스무디", iceOnly: true },
        { name: "자몽 요거트 스무디", iceOnly: true },
        { name: "유자 요거트 스무디", iceOnly: true },
        { name: "딸기 요거트 스무디", iceOnly: true },
        { name: "이탈리안 젤라또", iceOnly: true }
    ];

    const SB_URL = "https://bmzzdaaxvuturujzmwlx.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // 기존 키 유지
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    window.onload = function() {
        const menuSelect = document.getElementById('mName');
        const tempSelect = document.getElementById('isIce');
        
        // 메뉴 채우기
        menuSelect.innerHTML = '<option value="">-- 메뉴를 선택하세요 --</option>';
        coffeeMenus.forEach(menu => {
            const option = document.createElement('option');
            option.value = menu.name;
            option.innerText = menu.name;
            menuSelect.appendChild(option);
        });

        // [핵심 로직] 메뉴 선택 시 '온도' 옵션 제어하기
        menuSelect.addEventListener('change', function() {
            const selectedMenuName = this.value;
            const selectedMenuData = coffeeMenus.find(m => m.name === selectedMenuName);

            if (selectedMenuData && selectedMenuData.iceOnly) {
                // ICE 전용 메뉴일 경우
                tempSelect.value = "true"; // 강제로 ICE 선택
                // HOT 옵션만 찾아서 비활성화
                tempSelect.options[1].disabled = true; 
                alert("이 메뉴는 ICE 전용입니다!");
            } else {
                // HOT도 가능한 메뉴일 경우
                tempSelect.options[1].disabled = false;
            }
        });

        // 세션 확인 로직
        const params = new URLSearchParams(window.location.search);
        const sid = params.get('sid');
        if(!sid) {
            document.body.innerHTML = "<h3>잘못된 접근입니다. 관리자가 공유한 링크를 이용해 주세요.</h3>";
        } else {
            document.getElementById('sessionDisplay').innerText = `주문 세션: ${sid}`;
            window.currentSid = sid;
        }
    };

    async function sendOrder() {
        const name = document.getElementById('uName').value;
        const menu = document.getElementById('mName').value;
        const ice = document.getElementById('isIce').value === "true";

        if(!name) return alert("이름을 입력하세요.");
        if(!menu) return alert("메뉴를 선택하세요.");

        const { error } = await supabaseClient.from('orders').insert([{
            user_name: name, menu_name: menu, is_ice: ice, session_id: window.currentSid
        }]);

        if(!error) {
            document.getElementById('orderView').style.display = 'none';
            document.getElementById('successView').style.display = 'block';
        } else {
            alert("오류: " + error.message);
        }
    }
</script>

</body>
</html>
