<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커피 주문하기</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 350px; }
        .session-tag { background: #6f4e37; color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.8em; display: inline-block; margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #6f4e37; color: white; font-weight: bold; border: none; cursor: pointer; }
        #successView { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div id="orderView">
        <div id="sessionDisplay" class="session-tag">세션 확인 중...</div>
        <h2>☕ 커피 주문</h2>
        <input type="text" id="uName" placeholder="이름 입력">
        <select id="mName">
            <option value="아메리카노">아메리카노</option>
            <option value="카페라떼">카페라떼</option>
            <option value="복숭아아이스티">복숭아아이스티</option>
        </select>
        <select id="isIce">
            <option value="true">ICE</option>
            <option value="false">HOT</option>
        </select>
        <button onclick="sendOrder()">주문하기</button>
    </div>

    <div id="successView">
        <h2 style="color:#4CAF50;">✅ 주문 완료!</h2>
        <p>전송되었습니다. 맛있게 드세요!</p>
    </div>
</div>

<script>
    const SB_URL = "https://bmzzdaaxvuturujzmwlx.supabase.co/rest/v1/";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtenpkYWF4dnV0dXJ1anptd2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MTgwOTIsImV4cCI6MjA5Mjk5NDA5Mn0.WnWQNn8XHWHGhHVxZN0GvC77g7qQsdBOzcnAAPJLrOg";

    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // URL에서 ?sid=값 가져오기
    const params = new URLSearchParams(window.location.search);
    const sid = params.get('sid');

    if(!sid) {
        document.body.innerHTML = "<h3>잘못된 접근입니다. 관리자가 공유한 링크를 이용해 주세요.</h3>";
    } else {
        document.getElementById('sessionDisplay').innerText = `주문 세션: ${sid}`;
    }

    async function sendOrder() {
        const name = document.getElementById('uName').value;
        const menu = document.getElementById('mName').value;
        const ice = document.getElementById('isIce').value === "true";

        if(!name) return alert("이름을 입력하세요.");

        const { error } = await supabaseClient.from('orders').insert([{
            user_name: name, menu_name: menu, is_ice: ice, session_id: sid
        }]);

        if(!error) {
            document.getElementById('orderView').style.display = 'none';
            document.getElementById('successView').style.display = 'block';
        } else {
            alert("오류: " + error.message);
        }
    }
</script>
</body>
</html>
