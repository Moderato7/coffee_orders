<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>커피 주문 관리자</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; line-height: 1.6; }
        .box { background: white; padding: 20px; border-radius: 12px; max-width: 600px; margin: 0 auto 20px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #6f4e37; color: white; cursor: pointer; border: none; }
        .session-link { background: #e9ecef; padding: 10px; margin-top: 10px; word-break: break-all; font-size: 0.9em; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h2>🆕 새로운 주문 세션 생성</h2>
    <input type="text" id="sessionInput" placeholder="예: 4월29일오전">
    <button onclick="createSession()">링크 생성하기</button>
    <div id="linkArea" class="session-link" style="display:none;"></div>
</div>

<div class="box">
    <h2>📊 세션별 주문 확인</h2>
    <input type="text" id="targetSession" placeholder="확인할 세션명 입력">
    <button onclick="loadOrders()">조회하기</button>
    <div id="summary" style="margin-top:15px; font-weight:bold; color:#6f4e37;"></div>
    <table id="orderTable">
        <thead>
            <tr><th>주문자</th><th>메뉴</th><th>옵션</th></tr>
        </thead>
        <tbody id="orderList"></tbody>
    </table>
</div>

<script>
    const SB_URL = "https://bmzzdaaxvuturujzmwlx.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtenpkYWF4dnV0dXJ1anptd2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MTgwOTIsImV4cCI6MjA5Mjk5NDA5Mn0.WnWQNn8XHWHGhHVxZN0GvC77g7qQsdBOzcnAAPJLrOg";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    

    // 1. 세션 링크 생성 및 화면 표시
    function createSession() {
        const sName = document.getElementById('sessionInput').value;
        if(!sName) return alert("세션 이름을 입력하세요.");
        
        // 내 GitHub Pages 주소 (본인 주소로 수정 필수)
        const baseUrl = window.location.href.replace('admin.html', 'index.html');
        const finalUrl = `${baseUrl}?sid=${encodeURIComponent(sName)}`;
        
        const linkArea = document.getElementById('linkArea');
        linkArea.style.display = 'block';
        linkArea.innerHTML = `공유 링크: <a href="${finalUrl}" target="_blank">${finalUrl}</a><br><br>위 링크를 복사해서 메신저에 공유하세요!`;
        document.getElementById('targetSession').value = sName; // 조회창에도 자동 입력
    }

    // 2. 해당 세션의 주문 불러오기
    async function loadOrders() {
        const sid = document.getElementById('targetSession').value;
        const { data, error } = await supabaseClient
            .from('orders')
            .select('*')
            .eq('session_id', sid);

        const list = document.getElementById('orderList');
        const summary = document.getElementById('summary');
        list.innerHTML = "";
        
        if(data.length === 0) {
            summary.innerHTML = "데이터가 없습니다.";
            return;
        }

        const counts = {};
        data.forEach(ord => {
            const opt = ord.is_ice ? "ICE" : "HOT";
            list.innerHTML += `<tr><td>${ord.user_name}</td><td>${ord.menu_name}</td><td>${opt}</td></tr>`;
            const key = `${ord.menu_name}(${opt})`;
            counts[key] = (counts[key] || 0) + 1;
        });

        summary.innerHTML = "총계: " + Object.entries(counts).map(([k, v]) => `${k} ${v}잔`).join(", ");
    }
</script>
</body>
</html>
